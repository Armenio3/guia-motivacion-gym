<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guía & Motivación Gym</title>

  <style>
    :root{
      --bg:#090909;
      --bg2:#101010;
      --panel:#121212;
      --panel2:#171717;
      --text:#ffffff;
      --muted:rgba(255,255,255,.82);
      --muted2:rgba(255,255,255,.62);
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,122,0,.22);
      --orange:#ff7a00;
      --orange2:#ff9b34;
      --orange3:#ffb55f;
      --shadow:0 20px 70px rgba(0,0,0,.65);
      --radius:20px;
      --max:1140px;
    }

    *{
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    html,body{
      margin:0;
      padding:0;
    }

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 50% -50%, rgba(255,122,0,.16), transparent 65%),
        radial-gradient(900px 520px at 10% 20%, rgba(255,122,0,.07), transparent 60%),
        linear-gradient(180deg, #0a0a0a 0%, #090909 100%);
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    .wrap{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
      position:relative;
      z-index:2;
    }

    .soft2{
      color:var(--muted2);
    }

    .divider{
      width:130px;
      height:2px;
      margin:14px auto 0;
      background:linear-gradient(90deg, transparent, rgba(255,122,0,.95), transparent);
      filter:drop-shadow(0 0 12px rgba(255,122,0,.28));
    }

    .section-glow{
      position:relative;
      isolation:isolate;
    }

    .section-glow::before{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:180px;
      background:radial-gradient(closest-side, rgba(255,122,0,.08), transparent 70%);
      z-index:0;
      pointer-events:none;
      transform:translateY(25%);
    }

    header{
      position:sticky;
      top:0;
      z-index:100;
      background:rgba(11,11,11,.72);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:240px;
    }

    .brand-photo{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        0 0 0 2px rgba(255,122,0,.10),
        0 14px 30px rgba(255,122,0,.18);
      flex-shrink:0;
    }

    .brand b{
      font-weight:900;
      letter-spacing:.2px;
      font-size:14px;
      line-height:1.15;
    }

    .brand b span{
      color:var(--orange);
    }

    nav ul{
      list-style:none;
      padding:0;
      margin:0;
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    nav a{
      font-size:13px;
      color:var(--muted);
      padding:8px 10px;
      border-radius:10px;
      transition:all .25s ease;
      position:relative;
    }

    nav a::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      bottom:4px;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--orange), transparent);
      transform:scaleX(0);
      transform-origin:center;
      transition:transform .25s ease;
    }

    nav a:hover{
      background:rgba(255,255,255,.05);
      color:var(--text);
    }

    nav a:hover::after{
      transform:scaleX(1);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:12px;
      font-weight:900;
      letter-spacing:.2px;
      border:1px solid transparent;
      transition:transform .18s ease, filter .2s ease, box-shadow .25s ease, border .25s ease, background .25s ease;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:70%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform:skewX(-25deg);
      transition:left .6s ease;
    }

    .btn:hover::before{
      left:130%;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn.primary{
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      color:#121212;
      box-shadow:0 16px 45px rgba(255,122,0,.20);
    }

    .btn.primary:hover{
      filter:brightness(1.05);
      box-shadow:0 18px 50px rgba(255,122,0,.32);
    }

    .btn.ghost{
      background:rgba(255,255,255,.03);
      border-color:rgba(255,255,255,.18);
      color:var(--text);
    }

    .btn.ghost:hover{
      border-color:rgba(255,122,0,.45);
      box-shadow:0 0 0 4px rgba(255,122,0,.12);
    }

    .hero{
      padding:26px 0 26px;
      position:relative;
    }

    .hero-card{
      border-radius:30px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      background:
        linear-gradient(180deg, rgba(0,0,0,.22), rgba(0,0,0,.62)),
        linear-gradient(90deg, rgba(0,0,0,.78) 0%, rgba(0,0,0,.48) 48%, rgba(0,0,0,.26) 100%),
        url("https://i.ibb.co/m5Y79gBm/3152c6db-4710-46f6-9e69-cfcf5f133600.png") center/cover no-repeat;
      min-height:590px;
      position:relative;
      isolation:isolate;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(700px 300px at 18% 15%, rgba(255,122,0,.12), transparent 55%),
        radial-gradient(900px 420px at 80% 20%, rgba(255,122,0,.10), transparent 55%);
      z-index:0;
      pointer-events:none;
    }

    .hero-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(950px 520px at 70% 25%, rgba(255,122,0,.14), transparent 62%);
      pointer-events:none;
      z-index:0;
    }

    .hero-grid{
      position:relative;
      z-index:2;
      min-height:590px;
      display:grid;
      grid-template-columns:1.08fr .92fr;
      align-items:center;
      gap:26px;
      padding:42px 28px;
    }

    .hero-copy{
      position:relative;
      z-index:2;
      max-width:720px;
    }

    .hero-top{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      margin-bottom:24px;
    }

    .hero-top .left{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:12px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(8px);
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--orange);
      box-shadow:0 0 0 6px rgba(255,122,0,.15);
    }

    h1{
      margin:0 0 14px;
      font-size:clamp(36px, 5vw, 66px);
      line-height:.96;
      font-weight:950;
      letter-spacing:.6px;
      text-transform:uppercase;
      text-shadow:0 14px 50px rgba(0,0,0,.55);
      max-width:900px;
    }

    h1 .amp{
      color:var(--orange);
      text-shadow:0 0 18px rgba(255,122,0,.35);
    }

    .hero-sub{
      margin:0 0 12px;
      max-width:620px;
      color:var(--muted);
      font-size:clamp(15px, 1.9vw, 19px);
      line-height:1.5;
    }

    .hero-sub small{
      display:block;
      margin-top:6px;
      color:var(--muted2);
      font-size:.95em;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      justify-content:flex-start;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .quick-stats{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:14px;
      margin-top:24px;
      max-width:640px;
    }

    .stat{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px 12px;
      text-align:center;
      backdrop-filter:blur(8px);
      box-shadow:0 12px 34px rgba(0,0,0,.18);
      transition:transform .22s ease, border-color .22s ease;
    }

    .stat:hover{
      transform:translateY(-4px);
      border-color:rgba(255,122,0,.28);
    }

    .stat strong{
      display:block;
      color:var(--orange2);
      font-size:18px;
      margin-bottom:4px;
    }

    .stat span{
      font-size:12px;
      color:var(--muted);
    }

    .hero-side{
      position:relative;
      min-height:420px;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      z-index:1;
    }

    .hero-badge{
      position:absolute;
      right:18px;
      bottom:18px;
      background:rgba(0,0,0,.58);
      border:1px solid rgba(255,122,0,.35);
      border-radius:16px;
      padding:14px 16px;
      color:#fff;
      backdrop-filter:blur(8px);
      box-shadow:0 12px 30px rgba(0,0,0,.30);
      z-index:3;
    }

    .hero-badge strong{
      display:block;
      color:var(--orange);
      font-size:15px;
      margin-bottom:4px;
    }

    .hero-badge span{
      font-size:13px;
      color:var(--muted);
    }

    .gym-shapes{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      overflow:hidden;
    }

    .shape{
      position:absolute;
      opacity:.18;
      filter:drop-shadow(0 16px 24px rgba(0,0,0,.35));
      transition:transform .18s linear;
      will-change:transform;
    }

    .shape.plate{
      width:130px;
      height:130px;
      border-radius:50%;
      border:10px solid rgba(255,122,0,.92);
      background:
        radial-gradient(circle at center, transparent 0 22px, rgba(255,255,255,.05) 22px 28px, transparent 28px),
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.14), transparent 45%),
        linear-gradient(145deg, rgba(255,122,0,.12), rgba(255,255,255,.02));
      box-shadow:
        inset 0 0 0 8px rgba(0,0,0,.34),
        inset 0 0 22px rgba(255,122,0,.10),
        0 0 24px rgba(255,122,0,.10);
    }

    .shape.plate::before,
    .shape.plate::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:2px solid rgba(255,122,0,.22);
    }

    .shape.dumbbell{
      width:220px;
      height:70px;
    }

    .shape.dumbbell::before{
      content:"";
      position:absolute;
      left:40px;
      right:40px;
      top:29px;
      height:12px;
      border-radius:999px;
      background:linear-gradient(180deg, #d8d8d8, #777);
      box-shadow:inset 0 0 6px rgba(0,0,0,.45);
    }

    .shape.dumbbell .w{
      position:absolute;
      top:12px;
      width:30px;
      height:46px;
      border-radius:8px;
      background:linear-gradient(180deg, #1d1d1f, #090909);
      border:2px solid rgba(255,122,0,.40);
    }

    .shape.dumbbell .w1{ left:0; }
    .shape.dumbbell .w2{ left:22px; width:22px; }
    .shape.dumbbell .w3{ right:22px; width:22px; }
    .shape.dumbbell .w4{ right:0; }

    .shape-bar{
      position:absolute;
      width:260px;
      height:22px;
      opacity:.14;
      pointer-events:none;
      z-index:1;
      transition:transform .18s linear;
    }

    .shape-bar::before{
      content:"";
      position:absolute;
      inset:7px 30px;
      border-radius:999px;
      background:linear-gradient(180deg, #d9d9d9, #7e7e7e);
      box-shadow:inset 0 0 6px rgba(0,0,0,.45);
    }

    .shape-bar::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 10px 11px, transparent 0 6px, rgba(255,122,0,.95) 6px 10px, transparent 10px),
        radial-gradient(circle at 26px 11px, transparent 0 6px, rgba(255,122,0,.95) 6px 10px, transparent 10px),
        radial-gradient(circle at calc(100% - 26px) 11px, transparent 0 6px, rgba(255,122,0,.95) 6px 10px, transparent 10px),
        radial-gradient(circle at calc(100% - 10px) 11px, transparent 0 6px, rgba(255,122,0,.95) 6px 10px, transparent 10px);
    }

    .shape-1{ top:9%; right:-35px; }
    .shape-2{ top:62%; left:-48px; width:92px; height:92px; }
    .shape-3{ top:44%; right:7%; transform:rotate(-18deg); opacity:.12; }
    .shape-4{ bottom:10%; right:-36px; transform:rotate(11deg); }

    section{
      padding:62px 0;
      position:relative;
    }

    .title{
      text-align:center;
      margin:0 0 10px;
      font-weight:950;
      letter-spacing:.2px;
      font-size:30px;
    }

    .title span{
      color:var(--orange);
    }

    .sub{
      text-align:center;
      margin:0 auto 26px;
      max-width:780px;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
      margin-top:22px;
    }

    .card{
      background:
        radial-gradient(650px 180px at 50% 0%, rgba(255,122,0,.10), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:22px 18px 18px;
      box-shadow:0 16px 45px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      isolation:isolate;
      backdrop-filter:blur(6px);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:auto -20% -60% auto;
      width:160px;
      height:160px;
      border-radius:50%;
      border:14px solid rgba(255,122,0,.07);
      z-index:0;
      transform:rotate(18deg);
      transition:transform .3s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 22px 55px rgba(0,0,0,.42);
      border-color:rgba(255,122,0,.20);
    }

    .card:hover::before{
      transform:rotate(80deg) scale(1.05);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:-1px;
      background:radial-gradient(420px 120px at 50% 120%, rgba(255,122,0,.09), transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .icon{
      width:56px;
      height:56px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:rgba(255,122,0,.12);
      border:1px solid rgba(255,122,0,.25);
      box-shadow:0 14px 35px rgba(255,122,0,.14);
      margin:0 auto 12px;
      position:relative;
      z-index:1;
      transition:transform .22s ease, box-shadow .22s ease;
    }

    .card:hover .icon{
      transform:scale(1.06);
      box-shadow:0 18px 42px rgba(255,122,0,.20);
    }

    .icon svg{
      width:28px;
      height:28px;
      fill:var(--orange);
    }

    .card h3{
      margin:0 0 8px;
      text-align:center;
      font-size:16px;
      font-weight:950;
      position:relative;
      z-index:1;
    }

    .card p{
      margin:0;
      text-align:center;
      color:var(--muted);
      font-size:13.5px;
      position:relative;
      z-index:1;
      line-height:1.55;
    }

    .cta-band{
      margin-top:36px;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(900px 240px at 50% 0%, rgba(255,122,0,.16), transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:24px;
      padding:32px 20px;
      text-align:center;
      box-shadow:0 14px 40px rgba(0,0,0,.22);
      position:relative;
      overflow:hidden;
    }

    .cta-band h2{
      margin:0 0 14px;
      font-size:21px;
      letter-spacing:.4px;
      text-transform:uppercase;
      font-weight:950;
      position:relative;
      z-index:1;
    }

    .cta-band h2 span{
      color:var(--orange);
    }

    .cta-band p{
      position:relative;
      z-index:1;
    }

    .mini-gallery{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:16px;
      margin-top:28px;
    }

    .gallery-card{
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      min-height:280px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.48)),
        url("https://i.ibb.co/6Rm5Tbk3/GYM-imagen2.jpg") center/cover no-repeat;
      box-shadow:0 18px 45px rgba(0,0,0,.28);
      position:relative;
    }

    .gallery-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.52));
      pointer-events:none;
    }

    .gallery-copy{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:1;
    }

    .gallery-copy strong{
      display:block;
      font-size:18px;
      margin-bottom:6px;
    }

    .gallery-copy span{
      color:var(--muted);
      font-size:13px;
    }

    .gallery-side{
      display:grid;
      gap:16px;
    }

    .mini-panel{
      border-radius:20px;
      background:
        radial-gradient(500px 180px at 50% 0%, rgba(255,122,0,.08), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      padding:20px;
      box-shadow:0 16px 40px rgba(0,0,0,.26);
    }

    .mini-panel h4{
      margin:0 0 10px;
      font-size:16px;
      color:var(--orange2);
    }

    .mini-panel p{
      margin:0;
      color:var(--muted);
      font-size:13.5px;
      line-height:1.6;
    }

    /* BOTONES ACTIVIDADES AGRANDADOS */
    .activity-buttons{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:22px;
      margin-top:34px;
      align-items:stretch;
    }

    .actividad-btn{
      position:relative;
      cursor:pointer;
      min-height:260px;
      padding:28px 24px 72px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        radial-gradient(520px 220px at 50% 0%, rgba(255,122,0,.14), transparent 60%);
      transition:all .25s ease;
      overflow:hidden;
      box-shadow:0 18px 45px rgba(0,0,0,.28);
      text-align:left;
      color:var(--text);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .actividad-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,122,0,.20), transparent);
      opacity:0;
      transition:opacity .28s ease;
    }

    .actividad-btn::after{
      content:"CLICK PARA VER";
      position:absolute;
      left:24px;
      right:24px;
      bottom:20px;
      height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:900;
      letter-spacing:1px;
      color:#fff;
      border-radius:14px;
      background:linear-gradient(135deg, rgba(255,122,0,.95), rgba(255,155,52,.95));
      box-shadow:0 10px 24px rgba(255,122,0,.22);
      border:none;
    }

    .actividad-btn:hover{
      transform:translateY(-8px) scale(1.015);
      border-color:rgba(255,122,0,.38);
      box-shadow:0 26px 58px rgba(255,122,0,.16);
    }

    .actividad-btn:hover::before{
      opacity:1;
    }

    .actividad-btn:active{
      transform:translateY(-2px) scale(.995);
    }

    .actividad-btn .tag{
      position:absolute;
      top:18px;
      right:18px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.5px;
      background:rgba(255,122,0,.14);
      border:1px solid rgba(255,122,0,.22);
      padding:6px 10px;
      border-radius:999px;
      color:var(--orange2);
      z-index:2;
    }

    .actividad-btn-top{
      display:flex;
      align-items:flex-start;
      gap:16px;
      position:relative;
      z-index:1;
    }

    .actividad-btn-icon{
      width:68px;
      height:68px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:rgba(255,122,0,.12);
      border:1px solid rgba(255,122,0,.22);
      flex-shrink:0;
