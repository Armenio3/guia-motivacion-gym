<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía & Motivación Gym</title>

<style>
:root{
  --bg:#0a0a0a;
  --text:#fff;
  --orange:#ff7a00;
  --orange2:#ff9b34;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero{
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.7)),
    url("https://i.ibb.co/m5Y79gBm/3152c6db-4710-46f6-9e69-cfcf5f133600.png") center/cover;
  padding:120px 20px;
  text-align:center;
}

.hero h1{
  font-size:48px;
  margin:0;
}

.hero h1 span{
  color:var(--orange);
}

.hero p{
  margin:10px 0 20px;
  color:#ccc;
}

.btn{
  padding:14px 22px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn.primary{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
}

.btn.ghost{
  background:transparent;
  border:1px solid #555;
  color:#fff;
}

/* ACTIVIDADES */
.section{
  padding:60px 20px;
  text-align:center;
}

.activity-buttons{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  max-width:1100px;
  margin:auto;
}

.actividad-btn{
  background:#111;
  border-radius:20px;
  padding:30px;
  min-height:250px;
  cursor:pointer;
  position:relative;
  transition:.3s;
  border:1px solid #222;
}

.actividad-btn:hover{
  transform:translateY(-8px);
  border-color:var(--orange);
}

.actividad-btn h3{
  color:var(--orange2);
  font-size:24px;
}

.actividad-btn p{
  color:#bbb;
  font-size:16px;
}

.actividad-btn::after{
  content:"CLICK PARA VER";
  position:absolute;
  bottom:15px;
  left:20px;
  right:20px;
  background:var(--orange);
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal img{
  max-width:90%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  background:var(--orange);
  border:none;
  padding:10px;
  cursor:pointer;
}

/* MODAL ACTIVIDAD */
.modal-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  max-width:900px;
  width:90%;
}

.carousel img{
  width:100%;
  border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .activity-buttons{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>GUÍA <span>&</span> MOTIVACIÓN GYM</h1>
  <p>Entrená con disciplina. Transformá tu cuerpo.</p>
  <button class="btn primary">EMPEZAR HOY</button>
  <button class="btn ghost" onclick="openHorarios()">VER HORARIOS</button>
</section>

<!-- ACTIVIDADES -->
<section class="section">
  <h2>Actividades</h2>

  <div class="activity-buttons">
    
    <div class="actividad-btn" onclick="openActividad('musculacion')">
      <h3>Musculación</h3>
      <p>Fuerza, masa muscular y progreso real.</p>
    </div>

    <div class="actividad-btn" onclick="openActividad('funcional')">
      <h3>Funcional</h3>
      <p>Movimiento, energía y resistencia.</p>
    </div>

    <div class="actividad-btn" onclick="openActividad('pilates')">
      <h3>Pilates</h3>
      <p>Equilibrio, postura y bienestar.</p>
    </div>

  </div>
</section>

<!-- MODAL HORARIOS -->
<div class="modal" id="horariosModal">
  <button class="close" onclick="closeModal()">X</button>
  <img src="https://i.ibb.co/PZNMTqXn/Whats-App-Image-2026-03-02-at-23-34-11.jpg">
</div>

<!-- MODAL ACTIVIDAD -->
<div class="modal" id="actividadModal">
  <div class="modal-box">
    <button class="close" onclick="closeModal()">X</button>
    <h2 id="titulo"></h2>
    <p id="descripcion"></p>

    <div class="carousel">
      <img id="imgActividad" src="">
    </div>
  </div>
</div>

<script>

function openHorarios(){
  document.getElementById("horariosModal").classList.add("active");
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("active"));
}

function openActividad(tipo){
  const data={
    musculacion:{
      titulo:"Musculación",
      desc:"Entrenamiento de fuerza con máquinas y peso libre.",
      img:"https://i.ibb.co/6Rm5Tbk3/GYM-imagen2.jpg"
    },
    funcional:{
      titulo:"Funcional",
      desc:"Entrenamiento dinámico y quema grasa.",
      img:"https://i.ibb.co/ZYW3VTp/brown-brim.png"
    },
    pilates:{
      titulo:"Pilates",
      desc:"Control corporal, postura y equilibrio.",
      img:"https://i.ibb.co/7zQ6z3f/sample.jpg"
    }
  };

  document.getElementById("titulo").innerText=data[tipo].titulo;
  document.getElementById("descripcion").innerText=data[tipo].desc;
  document.getElementById("imgActividad").src=data[tipo].img;

  document.getElementById("actividadModal").classList.add("active");
}

</script>

</body>
</html>
